name: Release to RubyGems

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Extract version from version.rb
        id: gem_version
        run: |
          VERSION=$(ruby -e "require './lib/spina/blocks/version'; puts Spina::Blocks::VERSION")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.gem_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.gem_version.outputs.version }} already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.gem_version.outputs.version }} does not exist, proceeding with release."
          fi

      - name: Build gem
        if: steps.check_tag.outputs.exists == 'false'
        run: gem build spina-blocks.gemspec

      - name: Push to RubyGems
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          mkdir -p ~/.gem
          echo "---" > ~/.gem/credentials
          echo ":rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}" >> ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem push spina-blocks-${{ steps.gem_version.outputs.version }}.gem
          rm -f ~/.gem/credentials

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.gem_version.outputs.version }}"
          git push origin "v${{ steps.gem_version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gem_version.outputs.version }}
          name: v${{ steps.gem_version.outputs.version }}
          generate_release_notes: true
          files: spina-blocks-${{ steps.gem_version.outputs.version }}.gem
