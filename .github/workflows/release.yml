name: Release to RubyGems

on:
  push:
    branches: [main]

jobs:
  release:
    name: Push gem to RubyGems.org
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Check if version already released
        id: check_tag
        run: |
          VERSION=$(ruby -e "require './lib/spina/blocks/version'; puts Spina::Blocks::VERSION")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION does not exist, proceeding with release."
          fi

      - name: Release gem
        uses: rubygems/release-gem@v1
        if: steps.check_tag.outputs.exists == 'false'

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check_tag.outputs.version }}
          name: v${{ steps.check_tag.outputs.version }}
          generate_release_notes: true
