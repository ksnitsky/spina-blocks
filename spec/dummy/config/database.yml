development:
  adapter: postgresql
  encoding: unicode
  pool: 5
  database: spina_blocks_dev
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>
  username: <%= ENV.fetch('DB_USERNAME', 'postgres') %>
  password: <%= ENV.fetch('DB_PASSWORD', '') %>
  port: <%= ENV.fetch('DB_PORT', '5432') %>

test:
  adapter: postgresql
  encoding: unicode
  pool: 5
  database: spina_blocks_test
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>
  username: <%= ENV.fetch('DB_USERNAME', 'postgres') %>
  password: <%= ENV.fetch('DB_PASSWORD', '') %>
  port: <%= ENV.fetch('DB_PORT', '5432') %>
